<!doctype html>
<html lang="en">
<head>
    <title>Todo Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Thêm công việc</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <!-- ✅ FIX -->
            <form th:action="@{/todos/form}" method="post" th:object="${todo}">

                <div class="form-group">
                    <label>Nội dung</label>
                    <input type="text" class="form-control" th:field="*{content}">
                    <small class="text-danger" th:errors="*{content}"></small>
                </div>

                <div class="form-group">
                    <label>Hạn</label>
                    <input type="date" class="form-control" th:field="*{dueDate}">
                    <small class="text-danger" th:errors="*{dueDate}"></small>
                </div>

                <div class="form-group">
                    <label>Trạng thái</label>
                    <select class="form-control" th:field="*{status}">
                        <option value="PENDING">PENDING</option>
                        <option value="DONE">DONE</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ưu tiên</label>
                    <select class="form-control" th:field="*{priority}">
                        <option value="LOW">LOW</option>
                        <option value="MEDIUM">MEDIUM</option>
                        <option value="HIGH">HIGH</option>
                    </select>
                </div>

                <div class="d-flex">
                    <button class="btn btn-primary">Lưu công việc</button>
                    <a class="btn btn-secondary ml-2" th:href="@{/todos/list}">
                        Quay lại danh sách
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
